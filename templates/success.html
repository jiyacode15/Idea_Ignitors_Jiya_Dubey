<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Success - SBI Loan Portal</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #1a237e, #0d47a1);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* 🔥 MATCHING YOUR EXISTING UI STYLE */
.box {
    background: white;
    padding: 40px;
    border-radius: 12px;
    text-align: center;
    width: 420px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}

h2 {
    color: #1a237e;
    margin-bottom: 10px;
}

p {
    color: #555;
    margin-top: 10px;
}

.btn {
    margin-top: 25px;
    padding: 12px 20px;
    background: #ff9800;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
}

/* subtle animation */
.box {
    animation: fadeIn 0.6s ease-in-out;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="box">
    <h2>✅ Application Submitted!</h2>
    <p>Your loan application has been saved successfully.</p>
    <p>Redirecting to dashboard...</p>

    <button class="btn" onclick="window.location.href='/dashboard'">
        Go Now →
    </button>
</div>

<script>
// 🔥 AUTO REDIRECT (BEST UX)
setTimeout(() => {
    window.location.href = "/dashboard";
}, 2000);
</script>

</body>
</html>
