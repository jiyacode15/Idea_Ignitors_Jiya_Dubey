<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loan Predictor - SBI</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #1a237e, #0d47a1);
        }

        .navbar {
            background: #1a237e;
            padding: 15px 40px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }

        .btn-login {
            background: #ff9800;
            padding: 8px 16px;
            border-radius: 5px;
        }

        .container {
            max-width: 900px;
            margin: 80px auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        h2 {
            color: #1a237e;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .btn-main {
            background: #ff9800;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }

        .approved {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .rejected {
            background: #ffebee;
            color: #c62828;
        }

        .confidence-bar {
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            margin-top: 10px;
        }

        .confidence-fill {
            height: 10px;
            background: #1a237e;
            border-radius: 5px;
            width: 0%;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>State Bank of India</h2>

    <div>
        <a href="/">Home</a>
        <a href="/signup">Sign Up</a>
        <a href="/login" class="btn-login">Login</a>
    </div>
</div>

<div class="container">

    <h2>Loan Eligibility Checker</h2>
    <p>Enter your details to check approval chances instantly</p>

    <input type="number" id="income" placeholder="Enter Monthly Income">
    <input type="number" id="loan" placeholder="Enter Loan Amount">
    <input type="number" id="age" placeholder="Enter Age">

    <select id="employment">
        <option value="">Employment Type</option>
        <option value="1">Salaried</option>
        <option value="0">Self-Employed</option>
    </select>

    <select id="credit">
        <option value="">Credit History</option>
        <option value="1">Good</option>
        <option value="0">Bad</option>
    </select>

    <button class="btn-main" onclick="predict()">Check Eligibility</button>

    <div id="resultBox" class="result-box">
        <h3 id="resultTitle"></h3>
        <p id="resultText"></p>

        <div class="confidence-bar">
            <div id="confidenceFill" class="confidence-fill"></div>
        </div>

        <p id="confidenceText"></p>
    </div>

</div>

<script>

// 🔥 GET DATA FROM URL PARAMS
function getParams() {
    const params = new URLSearchParams(window.location.search);
    return {
        income: params.get("income"),
        loan: params.get("loan")
    };
}

// 🔥 LOAD DATA (URL OR DB)
async function loadData() {
    try {
        const params = getParams();

        if (params.income && params.loan) {
            document.getElementById("income").value = params.income;
            document.getElementById("loan").value = params.loan;
            return;
        }

        const res = await fetch("/get-latest");
        const data = await res.json();

        if (!data.error) {
            document.getElementById("income").value = data.income;
            document.getElementById("loan").value = data.loan;
        }
    } catch (err) {
        console.log("No data available");
    }
}

// 🔥 PREDICT FUNCTION
async function predict() {

    const box = document.getElementById("resultBox");
    const fill = document.getElementById("confidenceFill");

    box.style.display = "block";
    box.className = "result-box";

    document.getElementById("resultTitle").innerText = "Checking...";
    document.getElementById("resultText").innerText = "Analyzing your profile...";
    fill.style.width = "15%";

    const res = await fetch("/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            income: document.getElementById("income").value,
            credit_amount: document.getElementById("loan").value,
            age: document.getElementById("age").value,
            employment: document.getElementById("employment").value,
            credit_history: document.getElementById("credit").value
        })
    });

    const result = await res.json();

    let confidence = (result.approval_probability * 100).toFixed(1);

    if(result.status === "Approved"){
        box.className = "result-box approved";
        document.getElementById("resultTitle").innerText = "✅ Loan Approved";
        document.getElementById("resultText").innerText =
            "Recommended Loan: ₹" + result.recommended_loan;
    } else {
        box.className = "result-box rejected";
        document.getElementById("resultTitle").innerText = "❌ Loan Rejected";
        document.getElementById("resultText").innerText =
            "Try lower amount. Recommended: ₹" + result.recommended_loan;
    }

    fill.style.width = confidence + "%";

    document.getElementById("confidenceText").innerText =
        "Confidence: " + confidence + "%";

    box.scrollIntoView({behavior:"smooth"});
}

window.onload = loadData;

</script>

</body>
</html>
